<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Atlas Twins</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c8a84b;
      --bg-deep: #060606;
      --text: #e8e0d0;
      --text-muted: #7a7060;
    }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      letter-spacing: .3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .code {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 1px rgba(200,168,75,.3);
      line-height: 1;
      letter-spacing: .05em;
    }

    .gold-bar {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 1.5rem auto;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 4vw, 1.4rem);
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: .8rem;
    }

    p {
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: .05em;
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    a.btn {
      display: inline-block;
      padding: .75rem 2.5rem;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background .2s, color .2s;
    }

    a.btn:hover {
      background: var(--gold);
      color: #060606;
    }
  </style>
</head>
<body>
  <div class="logo">Atlas Twins</div>
  <div class="code">404</div>
  <div class="gold-bar"></div>
  <h1>Page Not Found</h1>
  <p>The path you're looking for has vanished into the mountains. Let's get you back.</p>
  <a class="btn" href="/">Return Home</a>
</body>
</html>
